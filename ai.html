<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmo's Jersey Guess</title>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #002E5D, #1E4D8F);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .game-container {
            background: white;
            color: #002E5D;
            padding: 40px;
            border-radius: 16px;
            width: 340px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            border-top: 6px solid #002E5D;
        }

        h1 { margin-bottom: 10px; color: #002E5D; font-size: 24px; }
        p { margin: 5px 0; color: #1E4D8F; }

        input {
            margin-top: 15px;
            padding: 12px;
            width: 90px;
            font-size: 18px;
            text-align: center;
            border-radius: 10px;
            border: 2px solid #002E5D;
        }

        button {
            margin-top: 15px;
            padding: 12px 18px;
            font-size: 16px;
            border: none;
            background: #002E5D;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.25s ease;
        }

        button:hover { background: #1E4D8F; transform: translateY(-2px); }

        #message { margin-top: 18px; font-size: 18px; font-weight: bold; min-height: 24px; }
        #attempts { margin-top: 10px; color: #1E4D8F; }

        .progress-bar {
            margin-top: 12px;
            height: 10px;
            background: #e6e6e6;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            width: 100%;
            background: #002E5D;
            transition: width 0.3s ease;
        }

        .stats-box {
            margin-top: 20px;
            padding-top: 12px;
            border-top: 2px solid #eee;
            font-size: 14px;
            color: #002E5D;
        }

        .home-btn { margin-top: 18px; background: #555; }
    </style>
</head>

<body>

<div class="game-container">
    <h1>🥍 Cosmo's Jersey Game</h1>
    <p>Cosmo is thinking of a jersey number. <br>See if you can guess it!</p>
    <p><strong>Range: 1 to 50</strong></p>

    <input type="number" id="guessInput" min="1" max="50">
    <br>
    <button onclick="checkGuess()">Guess Number</button>

    <div id="message"></div>
    <div id="attempts"></div>

    <div class="progress-bar">
        <div class="progress" id="progressBar"></div>
    </div>

    <div class="stats-box">
        <div id="stats"></div>
    </div>

    <button class="home-btn" onclick="goHome()">Return to Lacrosse Page</button>
</div>

<script>
    let secretJersey;
    let attemptsLeft;
    const maxAttempts = 5;

    let score = 0;
    let streak = 0;
    let highScore = localStorage.getItem("laxJerseyHighScore") || 0;

    function launchConfetti() {
        const duration = 1500;
        const end = Date.now() + duration;
        (function frame() {
            confetti({
                particleCount: 7,
                spread: 60,
                origin: { y: 0.6 },
                colors: ['#002E5D', '#FFFFFF', '#FFD700'] 
            });
            if (Date.now() < end) requestAnimationFrame(frame);
        })();
    }

    function updateStats() {
        document.getElementById("stats").textContent =
            "Score: " + score + " | Streak: " + streak + " | High Score: " + highScore;
    }

    function updateProgress() {
        document.getElementById("progressBar").style.width = (attemptsLeft / maxAttempts) * 100 + "%";
    }

    function startGame() {
        // Updated range to 1-50
        secretJersey = Math.floor(Math.random() * 50) + 1;
        attemptsLeft = maxAttempts;

        document.getElementById("message").textContent = "Game started!";
        document.getElementById("message").style.color = "#002E5D";
        document.getElementById("attempts").textContent = "Attempts left: " + attemptsLeft;
        document.getElementById("guessInput").value = "";
        document.getElementById("guessInput").disabled = false;

        updateStats();
        updateProgress();
    }

    function checkGuess() {
        const input = document.getElementById("guessInput");
        const guess = Number(input.value);

        if (!guess || guess < 1 || guess > 50) {
            document.getElementById("message").textContent = "Enter a number 1–50";
            document.getElementById("message").style.color = "red";
            return;
        }

        attemptsLeft--;
        updateProgress();

        if (guess === secretJersey) {
            launchConfetti();
            document.getElementById("guessInput").disabled = true;

            let points = (attemptsLeft * 20) + 50; // Boosted point logic
            score += points;
            streak++;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem("laxJerseyHighScore", highScore);
            }

            updateStats();
            document.getElementById("message").textContent = "🎯 GOAL! Number was " + secretJersey + "!";
            document.getElementById("message").style.color = "green";

            setTimeout(() => {
                if (confirm("Great scout! That was the right jersey. Play again?")) {
                    startGame();
                }
            }, 500);
            return;
        }

        if (attemptsLeft === 0) {
            streak = 0;
            updateStats();
            document.getElementById("message").textContent = "❌ Out of subs!";
            document.getElementById("message").style.color = "red";
            document.getElementById("guessInput").disabled = true;

            setTimeout(() => {
                if (confirm("Game over! The jersey number was " + secretJersey + ". Try the next game?")) {
                    startGame();
                }
            }, 500);
            return;
        }

        // Themed hints
        document.getElementById("message").textContent =
            guess < secretJersey ? "📈 Higher jersey number!" : "📉 Lower jersey number!";
        document.getElementById("message").style.color = "#1E4D8F";

        document.getElementById("attempts").textContent =
            "Attempts left: " + attemptsLeft;

        input.value = "";
        input.focus();
    }

    document.getElementById("guessInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") checkGuess();
    });

    function goHome() {
        window.location.href = "fromscratch.html"; 
    }

    startGame();
</script>

</body>
</html>
